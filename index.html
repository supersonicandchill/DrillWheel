
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚒 FIRE DRILL BIG WHEEL - Work of Search</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            margin: 0; padding: 20px 10px;
            background: linear-gradient(#111, #300);
            color: #ff0;
            font-family: 'Press Start 2P', system-ui;
            text-align: center;
            min-height: 100vh;
        }
        h1 { margin: 15px 0 5px; text-shadow: 0 0 20px #f00; font-size: 2.1rem; }
        .subtitle { color: #f80; margin-bottom: 10px; }
        canvas { 
            border: 18px solid #c00; 
            border-radius: 50%; 
            box-shadow: 0 0 50px #ff0, inset 0 0 60px #600; 
            margin: 15px auto; 
            display: block; 
            background: #000;
        }
        button {
            font-family: 'Press Start 2P', system-ui;
            font-size: 1.3rem; padding: 15px 35px; margin: 8px;
            background: #c00; color: white; border: 4px solid #ff0;
            cursor: pointer; text-shadow: 2px 2px 0 #000; box-shadow: 0 8px 0 #600;
        }
        button:active { transform: translateY(4px); box-shadow: 0 4px 0 #600; }
        #spinBtn { font-size: 2.1rem; padding: 25px 70px; background: #f00; }
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #111; border: 8px solid #f00; padding: 25px; max-width: 94%;
            color: #ff0; box-shadow: 0 0 30px #f00; max-height: 92vh; overflow-y: auto;
        }
        .drill-name { font-size: 1.7rem; color: #0f0; margin: 15px 0; }
        .close { position: absolute; top: 15px; right: 25px; font-size: 2.8rem; cursor: pointer; color: #f80; }
        pre { white-space: pre-wrap; font-size: 0.82rem; text-align: left; background:#222; padding:10px; border-radius:4px; }
    </style>
</head>
<body>
    <h1>🚒 BIG WHEEL 🚒</h1>
    <p class="subtitle">WORK OF SEARCH EDITION</p>
   
    <canvas id="wheel" width="620" height="620"></canvas>
   
    <div>
        <button id="spinBtn">SPIN IT!</button><br>
        <button onclick="showAddDrill()">+ ADD DRILL</button>
        <button onclick="resetToDefaults()">RESET DEFAULTS</button>
        <button onclick="toggleHistory()">HISTORY</button>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <div id="resultContent"></div>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeHistory()">×</span>
            <h2>HISTORY</h2>
            <div id="historyList" style="text-align:left; font-size:0.9rem; max-height:60vh; overflow-y:auto;"></div>
        </div>
    </div>

        const spinBtn = document.getElementById('spinBtn');

        let history = [];

        const defaultDrills = [

            {id:22, name:"Primary Search Patterns", cat:"Search", desc:"Left-hand vs right-hand search.", time:"15 min", equip:"Blackout hoods", diff:"Medium"},

            {id:44, name:"Search Size-Up", cat:"Search", desc:"Effective search size-up.", time:"10 min", equip:"None", diff:"Medium"},

            {id:47, name:"Beds Cribs & Furniture", cat:"Search", desc:"Systematic search of furniture.", time:"15 min", equip:"Full PPE", diff:"Medium"},

            {id:49, name:"Hydraulic Ventilation", cat:"Ventilation", desc:"Hydraulic vent operations.", time:"12 min", equip:"Hose line", diff:"Medium"},
            {id:50, name:"Targeted Search", cat:"Search", desc:"High probability search patterns.", time:"15 min", equip:"Full PPE", diff:"Medium"},
            {id:51, name:"Split Search", cat:"Search", desc:"Split search techniques.", time:"12 min", equip:"Full PPE", diff:"Medium"},
            {id:52, name:"FFRS Data Review", cat:"Search", desc:"Apply Firefighter Rescue Survey data.", time:"10 min", equip:"None", diff:"Medium"},
            {id:53, name:"Winter Ops Ice", cat:"Special", desc:"Cold weather and ice operations.", time:"20 min", equip:"Full PPE", diff:"Hard"},
            {id:54, name:"Elevator Fire Operations", cat:"Special", desc:"Elevator fire procedures.", time:"15 min", equip:"Full PPE", diff:"Hard"},
            {id:55, name:"Wildland Hose Lay", cat:"Wildland", desc:"Wildland hose deployment.", time:"15 min", equip:"Wildland hose", diff:"Medium"},

            {id:57, name:"Night Low-Light Ops", cat:"Special", desc:"Operations in low light.", time:"15 min", equip:"Flashlights", diff:"Medium"},
            {id:58, name:"Crew Resource Management", cat:"General", desc:"Crew coordination scenarios.", time:"15 min", equip:"Radios", diff:"Medium"},
            {id:59, name:"Speed vs Safety Tradeoffs", cat:"General", desc:"Decision making under pressure.", time:"12 min", equip:"None", diff:"Medium"},
            {id:60, name:"Improvised Tool Use", cat:"Skills", desc:"Using available tools creatively.", time:"15 min", equip:"Common tools", diff:"Medium"},
            {id:61, name:"Standpipe Operations", cat:"Highrise", desc:"Standpipe pack and advance.", time:"20 min", equip:"Standpipe kit", diff:"Hard"},
            {id:62, name:"Basement Fire Tactics", cat:"Tactics", desc:"Basement fire attack.", time:"18 min", equip:"Hose, SCBA", diff:"Hard"},
            {id:63, name:"Gloved Fine Motor", cat:"Skills", desc:"Fine motor tasks with gloves.", time:"8 min", equip:"Small objects", diff:"Easy"},
            {id:64, name:"My Baby My Baby", cat:"Survival", desc:"Panic simulation dummy carry.", time:"10 min", equip:"Dummy", diff:"Medium"},
            {id:65, name:"Trench Cut Simulation", cat:"Vent", desc:"Trench cut practice.", time:"15 min", equip:"Saw", diff:"Hard"},
            {id:66, name:"Portable Pump Operations", cat:"Pump", desc:"Portable pump drafting.", time:"15 min", equip:"Portable pump", diff:"Medium"},
            {id:67, name:"Elevator Rescue", cat:"Special", desc:"Elevator rescue simulation.", time:"20 min", equip:"Full PPE", diff:"Hard"},
            {id:68, name:"Multi-Story Search", cat:"Search", desc:"Multi-story search tactics.", time:"20 min", equip:"Full PPE", diff:"Hard"},
            {id:99, name:"CUSTOM DRILL", cat:"General", desc:"Add your own detailed drill here.", time:"Variable", equip:"As needed", diff:"Variable"}
        ];

        function loadDrills() {
            const saved = localStorage.getItem('fireDrills');
            drills = saved ? JSON.parse(saved) : [...defaultDrills];
            saveDrills();
        }

        function saveDrills() {
            localStorage.setItem('fireDrills', JSON.stringify(drills));
        }

        function resetToDefaults() {
            if (confirm("Reset to full defaults (85+ drills)?")) {
                drills = [...defaultDrills];
                saveDrills();
                drawWheel();
                alert("Full library restored!");
            }
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 280;
            const numSegments = drills.length;
            const anglePerSegment = (Math.PI * 2) / numSegments;

            for (let i = 0; i < numSegments; i++) {
                const startAngle = currentAngle + (i * anglePerSegment);
                const endAngle = startAngle + anglePerSegment;
                
                const hue = (i * 360 / numSegments) % 360;
                ctx.fillStyle = `hsl(${hue}, 85%, 60%)`;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 6;
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(startAngle + (anglePerSegment / 2) + Math.PI / 2);
                
                const text = drills[i].name;
                let fontSize = 19;
                if (text.length > 16) fontSize = 16;
                if (text.length > 20) fontSize = 13;
                
                ctx.font = `bold ${fontSize}px 'Press Start 2P'`;
                ctx.fillStyle = "#000";
                ctx.textAlign = "center";
                ctx.shadowColor = "#fff";
                ctx.shadowBlur = 6;
                ctx.fillText(text, 0, -radius * 0.62);
                ctx.restore();
            }
            
            ctx.fillStyle = "#111";
            ctx.beginPath();
            ctx.arc(cx, cy, 55, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#ff0";
            ctx.lineWidth = 14;
            ctx.stroke();
            
            ctx.fillStyle = "#f00";
            ctx.beginPath();
            ctx.moveTo(cx - 35, 45);
            ctx.lineTo(cx + 35, 45);
            ctx.lineTo(cx, 125);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "#ff0";
            ctx.lineWidth = 8;
            ctx.stroke();
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            
            const targetIndex = Math.floor(Math.random() * drills.length);
            const numSpins = 5 + Math.random() * 4;
            const targetAngle = currentAngle + (numSpins * Math.PI * 2) - (targetIndex * (Math.PI * 2 / drills.length)) + (Math.PI * 2 / drills.length * 0.5);
            
            let startTime = null;
            const duration = 4200;
            
            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                
                currentAngle = targetAngle * eased;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    spinBtn.disabled = false;
                    currentAngle = targetAngle;
                    drawWheel();
                    showResult(targetIndex);
                    addToHistory(drills[targetIndex]);
                }
            }
            requestAnimationFrame(animate);
        }

        function showResult(index) {
            const d = drills[index];
            const content = document.getElementById('resultContent');
            content.innerHTML = `
                <h2 style="color:#0f0;">LANDED ON:</h2>
                <div class="drill-name">${d.name}</div>
                <p><strong>Category:</strong> ${d.cat} | <strong>Time:</strong> ${d.time} | <strong>Difficulty:</strong> ${d.diff}</p>
                <p><strong>Equipment:</strong> ${d.equip}</p>
                <p style="line-height:1.5; margin:15px 0;">${d.desc}</p>
                ${d.objectives ? `<p><strong>Objectives:</strong><br><pre>${d.objectives}</pre></p>` : ''}
                ${d.safety ? `<p><strong>Safety:</strong><br><pre>${d.safety}</pre></p>` : ''}
                ${d.execution ? `<p><strong>Execution:</strong><br><pre>${d.execution}</pre></p>` : ''}
                <button onclick="closeModal()" style="margin-top:20px; padding:15px 30px;">SPIN AGAIN</button>
            `;
            document.getElementById('resultModal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = "none";
        }

        function addToHistory(drill) {
            history.unshift({
                name: drill.name,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            });
            if (history.length > 15) history.pop();
            localStorage.setItem('fireHistory', JSON.stringify(history));
        }

        function toggleHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = history.map(h => `<div>${h.time} — ${h.name}</div>`).join('');
            document.getElementById('historyModal').style.display = "flex";
        }

        function closeHistory() {
            document.getElementById('historyModal').style.display = "none";
        }

        function showAddDrill() {
            const name = prompt("New Drill Name:");
            if (!name) return;
            const cat = prompt("Category:", "Search");
            const desc = prompt("Description:", "");
            const time = prompt("Time:", "15 min");
            const equip = prompt("Equipment:", "");
            const diff = prompt("Difficulty:", "Medium");
            
            drills.push({
                id: Date.now(),
                name: name,
                cat: cat || "General",
                desc: desc || "",
                time: time || "15 min",
                equip: equip || "",
                diff: diff || "Medium"
            });
            saveDrills();
            drawWheel();
            alert("Drill added!");
        }

        function loadHistory() {
            const savedHist = localStorage.getItem('fireHistory');
            if (savedHist) history = JSON.parse(savedHist);
        }

        function init() {
            loadDrills();
            loadHistory();
            drawWheel();
           
            spinBtn.addEventListener('click', spinWheel);
           
            document.addEventListener('keydown', e => {
                if (e.key === " " && !isSpinning) {
                    e.preventDefault();
                    spinWheel();
                }
            });
           
            canvas.addEventListener('touchstart', () => {
                if (!isSpinning) spinWheel();
            });
        }

        window.onload = init;
    </script>
</body>
</html>
